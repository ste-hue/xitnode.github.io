name: Send Newsletter

on:
  workflow_dispatch:
    inputs:
      post_slug:
        description: "Post slug to send (leave empty for latest)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (render only, no send)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      test_email:
        description: "Test email — se specificata, manda solo a questo indirizzo"
        required: false
        default: ""

  schedule:
    - cron: "0 19 * * 0"  # Sunday 20:00 CET (19:00 UTC)

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: newsletter
        run: npm install

      - name: Prepare newsletter (render + convert SVGs)
        working-directory: newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            node send.js --since-last --dry-run
          else
            ARGS="--dry-run"
            if [ -n "${{ github.event.inputs.post_slug }}" ]; then
              ARGS="$ARGS --slug ${{ github.event.inputs.post_slug }}"
            fi
            node send.js $ARGS
          fi

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/email/
          git diff --staged --quiet || {
            git commit -m "Add newsletter diagram PNGs"
            git push
            echo "ASSETS_PUSHED=true" >> $GITHUB_ENV
          }

      - name: Wait for Pages deployment
        if: env.ASSETS_PUSHED == 'true'
        run: |
          echo "Waiting 90s for GitHub Pages to deploy new assets..."
          sleep 90

      - name: Send newsletter
        working-directory: newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run — skipping send."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            node send.js --since-last --update-tracker
          else
            ARGS=""
            if [ -n "${{ github.event.inputs.post_slug }}" ]; then
              ARGS="$ARGS --slug ${{ github.event.inputs.post_slug }}"
            fi
            node send.js $ARGS
          fi

      - name: Commit tracker update
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter/last-sent.json
          git diff --staged --quiet || git commit -m "Update newsletter last-sent tracker"
          git push
