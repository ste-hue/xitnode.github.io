<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="'Virgil', 'Comic Sans MS', sans-serif">
  <rect width="900" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="26" fill="#1e1e1e" font-weight="bold">Il ciclo del debito</text>
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#757575" font-style="italic">tracciamento parziale = controllo retrospettivo</text>

  <!-- Box 1: DECIDI -->
  <rect x="60" y="120" width="220" height="160" rx="10" ry="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="170" y="155" text-anchor="middle" font-size="20" fill="#495057" font-weight="bold">DECIDI</text>
  <text x="170" y="195" text-anchor="middle" font-size="13" fill="#495057" font-style="italic">"ne abbiamo parlato"</text>
  <text x="170" y="228" text-anchor="middle" font-size="13" fill="#868e96">nessuna traccia</text>
  <text x="170" y="250" text-anchor="middle" font-size="13" fill="#868e96">nessun documento</text>

  <!-- Arrow 1 -->
  <line x1="290" y1="200" x2="335" y2="200" stroke="#adb5bd" stroke-width="2"/>
  <polygon points="335,196 343,200 335,204" fill="#adb5bd"/>

  <!-- Box 2: TI IMPEGNI -->
  <rect x="345" y="120" width="220" height="160" rx="10" ry="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="455" y="155" text-anchor="middle" font-size="20" fill="#495057" font-weight="bold">TI IMPEGNI</text>
  <text x="455" y="190" text-anchor="middle" font-size="13" fill="#495057" font-style="italic">preventivo accettato</text>
  <text x="455" y="210" text-anchor="middle" font-size="13" fill="#495057" font-style="italic">contratto firmato</text>
  <text x="455" y="230" text-anchor="middle" font-size="13" fill="#495057" font-style="italic">ordine inviato</text>
  <text x="455" y="262" text-anchor="middle" font-size="13" fill="#868e96">nessuna traccia</text>

  <!-- Arrow 2 -->
  <line x1="575" y1="200" x2="620" y2="200" stroke="#adb5bd" stroke-width="2"/>
  <polygon points="620,196 628,200 620,204" fill="#adb5bd"/>

  <!-- Box 3: PAGHI -->
  <rect x="630" y="120" width="220" height="160" rx="10" ry="10" fill="#ffc9c9" stroke="#ef4444" stroke-width="2.5"/>
  <text x="740" y="155" text-anchor="middle" font-size="20" fill="#991b1b" font-weight="bold">PAGHI</text>
  <text x="740" y="195" text-anchor="middle" font-size="13" fill="#1e1e1e" font-style="italic">fattura ricevuta</text>
  <text x="740" y="230" text-anchor="middle" font-size="13" fill="#1e1e1e" font-weight="bold">ledger inizia qui</text>
  <text x="740" y="252" text-anchor="middle" font-size="13" fill="#991b1b">(troppo tardi)</text>

  <!-- Timeline -->
  <line x1="60" y1="335" x2="850" y2="335" stroke="#1e1e1e" stroke-width="1.5"/>
  <polygon points="850,330 862,335 850,340" fill="#1e1e1e"/>
  <text x="872" y="339" font-size="13" fill="#757575" font-style="italic">tempo</text>

  <!-- Zona buia bracket -->
  <line x1="60" y1="345" x2="60" y2="358" stroke="#868e96" stroke-width="1.5"/>
  <line x1="60" y1="358" x2="565" y2="358" stroke="#868e96" stroke-width="1.5"/>
  <line x1="565" y1="345" x2="565" y2="358" stroke="#868e96" stroke-width="1.5"/>
  <text x="312" y="382" text-anchor="middle" font-size="14" fill="#495057" font-weight="bold">zona buia</text>
  <text x="312" y="402" text-anchor="middle" font-size="12" fill="#757575" font-style="italic">budget negoziabile a posteriori</text>

  <!-- Zona ERP bracket -->
  <line x1="630" y1="345" x2="630" y2="358" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="630" y1="358" x2="850" y2="358" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="850" y1="345" x2="850" y2="358" stroke="#ef4444" stroke-width="1.5"/>
  <text x="740" y="382" text-anchor="middle" font-size="14" fill="#991b1b" font-weight="bold">zona ERP</text>
  <text x="740" y="402" text-anchor="middle" font-size="12" fill="#757575" font-style="italic">solo qui esiste evidenza</text>

  <!-- Bottom note -->
  <text x="450" y="450" text-anchor="middle" font-size="14" fill="#1e1e1e" font-weight="bold">il debito nasce a sinistra. lo registri a destra.</text>
  <text x="450" y="473" text-anchor="middle" font-size="13" fill="#757575" font-style="italic">il gap è dove si decide chi paga il prezzo</text>
</svg>
