<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700" font-family="'Virgil', 'Comic Sans MS', sans-serif">
  <!-- Background -->
  <rect width="900" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="26" fill="#1e1e1e" font-weight="bold">Toy API vs Serious API</text>
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#757575" font-style="italic">how a system handles ambiguous reality</text>

  <!-- Shared input -->
  <rect x="280" y="95" width="340" height="55" rx="8" ry="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="450" y="120" text-anchor="middle" font-size="13" fill="#757575">input</text>
  <text x="450" y="140" text-anchor="middle" font-size="15" fill="#1e1e1e" font-family="'Courier New', monospace" font-weight="bold">resolve_entity("Booking.com payment")</text>

  <!-- Arrow to toy -->
  <line x1="340" y1="155" x2="240" y2="195" stroke="#757575" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <!-- Arrow to serious -->
  <line x1="560" y1="155" x2="660" y2="195" stroke="#757575" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#757575"/>
    </marker>
  </defs>

  <!-- LEFT: Toy API -->
  <rect x="40" y="200" width="390" height="460" rx="12" ry="12" fill="#ffc9c9" fill-opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>

  <text x="235" y="235" text-anchor="middle" font-size="22" fill="#991b1b" font-weight="bold">Toy API</text>
  <text x="235" y="258" text-anchor="middle" font-size="13" fill="#991b1b" font-style="italic">always returns something</text>

  <!-- Signature -->
  <rect x="65" y="278" width="340" height="50" rx="8" ry="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
  <text x="235" y="308" text-anchor="middle" font-size="15" fill="#1e1e1e" font-family="'Courier New', monospace" font-weight="bold">-&gt; Entity</text>

  <!-- Case 1 -->
  <rect x="65" y="345" width="340" height="55" rx="8" ry="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="235" y="368" text-anchor="middle" font-size="12" fill="#757575">perfect match</text>
  <text x="235" y="388" text-anchor="middle" font-size="13" fill="#1e1e1e" font-weight="bold">returns Entity</text>

  <!-- Case 2 -->
  <rect x="65" y="415" width="340" height="55" rx="8" ry="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="235" y="438" text-anchor="middle" font-size="12" fill="#757575">ambiguous</text>
  <text x="235" y="458" text-anchor="middle" font-size="13" fill="#1e1e1e" font-weight="bold">picks one silently</text>

  <!-- Case 3 -->
  <rect x="65" y="485" width="340" height="55" rx="8" ry="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="235" y="508" text-anchor="middle" font-size="12" fill="#757575">no match</text>
  <text x="235" y="528" text-anchor="middle" font-size="13" fill="#1e1e1e" font-weight="bold">invents an Entity</text>

  <!-- Outcome -->
  <rect x="65" y="570" width="340" height="70" rx="8" ry="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="2.5"/>
  <text x="235" y="598" text-anchor="middle" font-size="13" fill="#991b1b" font-weight="bold">Outcome</text>
  <text x="235" y="622" text-anchor="middle" font-size="14" fill="#1e1e1e">a system that lies</text>

  <!-- RIGHT: Serious API -->
  <rect x="470" y="200" width="390" height="460" rx="12" ry="12" fill="#b2f2bb" fill-opacity="0.3" stroke="#22c55e" stroke-width="1.5"/>

  <text x="665" y="235" text-anchor="middle" font-size="22" fill="#15803d" font-weight="bold">Serious API</text>
  <text x="665" y="258" text-anchor="middle" font-size="13" fill="#15803d" font-style="italic">models uncertainty explicitly</text>

  <!-- Signature -->
  <rect x="495" y="278" width="340" height="50" rx="8" ry="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="665" y="308" text-anchor="middle" font-size="14" fill="#1e1e1e" font-family="'Courier New', monospace" font-weight="bold">-&gt; Entity | List[Entity] | None</text>

  <!-- Case 1 -->
  <rect x="495" y="345" width="340" height="55" rx="8" ry="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="665" y="368" text-anchor="middle" font-size="12" fill="#757575">perfect match</text>
  <text x="665" y="388" text-anchor="middle" font-size="13" fill="#1e1e1e" font-weight="bold">returns Entity</text>

  <!-- Case 2 -->
  <rect x="495" y="415" width="340" height="55" rx="8" ry="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="665" y="438" text-anchor="middle" font-size="12" fill="#757575">ambiguous</text>
  <text x="665" y="458" text-anchor="middle" font-size="13" fill="#1e1e1e" font-weight="bold">returns List[Entity] (candidates)</text>

  <!-- Case 3 -->
  <rect x="495" y="485" width="340" height="55" rx="8" ry="8" fill="#c3fae8" stroke="#06b6d4" stroke-width="2"/>
  <text x="665" y="508" text-anchor="middle" font-size="12" fill="#757575">too uncertain</text>
  <text x="665" y="528" text-anchor="middle" font-size="13" fill="#1e1e1e" font-weight="bold">returns None + confidence score</text>

  <!-- Outcome -->
  <rect x="495" y="570" width="340" height="70" rx="8" ry="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2.5"/>
  <text x="665" y="598" text-anchor="middle" font-size="13" fill="#15803d" font-weight="bold">Outcome</text>
  <text x="665" y="622" text-anchor="middle" font-size="14" fill="#1e1e1e">a system you can actually use</text>
</svg>
