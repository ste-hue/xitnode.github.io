<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-red2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a9eed"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="24" font-weight="600" fill="#1e1e1e">The Phase Transition</text>
  <text x="400" y="58" text-anchor="middle" font-size="14" fill="#757575">Recomputation → Persistent synthesis</text>

  <!-- LEFT: Before -->
  <rect x="30" y="90" width="340" height="490" rx="12" fill="#ffc9c9" fill-opacity="0.35" stroke="#ef4444" stroke-width="1"/>
  <text x="200" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#b91c1c">BEFORE — cognitively stateless</text>

  <rect x="60" y="135" width="280" height="40" rx="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="160" text-anchor="middle" font-size="15" fill="#1e1e1e">query</text>
  <line x1="200" y1="175" x2="200" y2="200" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <rect x="60" y="205" width="280" height="40" rx="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="230" text-anchor="middle" font-size="15" fill="#1e1e1e">retrieve fragments</text>
  <line x1="200" y1="245" x2="200" y2="270" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <rect x="60" y="275" width="280" height="40" rx="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="300" text-anchor="middle" font-size="15" fill="#1e1e1e">improvise coherence</text>
  <line x1="200" y1="315" x2="200" y2="340" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <rect x="60" y="345" width="280" height="40" rx="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="370" text-anchor="middle" font-size="15" fill="#1e1e1e">answer</text>

  <!-- Loop back arrow -->
  <path d="M 340 365 Q 380 280 380 175 Q 380 155 345 155" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-red2)"/>
  <text x="395" y="265" font-size="13" fill="#ef4444">again</text>
  <text x="395" y="282" font-size="13" fill="#ef4444">&amp;</text>
  <text x="395" y="299" font-size="13" fill="#ef4444">again</text>

  <!-- Bottom result panel left -->
  <rect x="60" y="410" width="280" height="140" rx="10" fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
  <text x="200" y="432" text-anchor="middle" font-size="15" font-weight="600" fill="#b91c1c">NOTHING ACCUMULATES</text>
  <text x="75" y="462" font-size="13" fill="#1e1e1e">• meetings repair memory loss</text>
  <text x="75" y="485" font-size="13" fill="#1e1e1e">• context resets every interaction</text>
  <text x="75" y="508" font-size="13" fill="#1e1e1e">• complexity = recomputation</text>
  <text x="75" y="531" font-size="13" fill="#1e1e1e">• ambiguity becomes infrastructure</text>

  <!-- BRIDGE -->
  <line x1="375" y1="335" x2="425" y2="335" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrow-purple2)"/>
  <text x="400" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#8b5cf6">phase</text>
  <text x="400" y="358" text-anchor="middle" font-size="13" font-weight="600" fill="#8b5cf6">transition</text>

  <!-- RIGHT: After -->
  <rect x="430" y="90" width="340" height="490" rx="12" fill="#d3f9d8" fill-opacity="0.40" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#15803d">AFTER — persistent synthesis</text>

  <rect x="460" y="135" width="280" height="40" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="600" y="160" text-anchor="middle" font-size="15" fill="#1e1e1e">query</text>
  <line x1="600" y1="175" x2="600" y2="200" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="460" y="205" width="280" height="60" rx="8" fill="#c3fae8" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="240" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">persistent interpretation</text>
  <line x1="600" y1="265" x2="600" y2="290" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="460" y="295" width="280" height="40" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="320" text-anchor="middle" font-size="15" fill="#1e1e1e">answer + new state</text>

  <!-- Feedback loop right -->
  <path d="M 740 315 Q 780 270 780 240 Q 780 215 745 235" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="788" y="265" font-size="13" fill="#22c55e">feeds</text>
  <text x="788" y="282" font-size="13" fill="#22c55e">back</text>

  <!-- Bottom panel right -->
  <rect x="460" y="360" width="280" height="190" rx="10" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="382" text-anchor="middle" font-size="15" font-weight="600" fill="#15803d">MEMORY COMPOUNDS</text>
  <text x="475" y="412" font-size="13" fill="#1e1e1e">• contradictions stay visible</text>
  <text x="475" y="435" font-size="13" fill="#1e1e1e">• decisions survive</text>
  <text x="475" y="458" font-size="13" fill="#1e1e1e">• context becomes inspectable</text>
  <text x="475" y="481" font-size="13" fill="#1e1e1e">• relationships persist</text>
  <text x="475" y="504" font-size="13" fill="#1e1e1e">• synthesis stops resetting</text>
  <text x="475" y="527" font-size="13" fill="#1e1e1e">• operational memory compounds</text>

  <!-- Footer -->
  <text x="400" y="605" text-anchor="middle" font-size="13" font-style="italic" fill="#757575">The shift is not retrieval. It is accumulation.</text>
</svg>
